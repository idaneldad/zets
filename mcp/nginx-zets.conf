# ═══════════════════════════════════════════════════════
# ZETS — Nginx Configuration (22.04.2026)
# ═══════════════════════════════════════════════════════
# Replaces cortex-v7-gui nginx block for ddev.chooz.co.il
# - Port 3140 = GUI (zets-gui, to be built)
# - Port 3145 = MCP SSE (zets_mcp_server.py)
# - Port 3147 = ZETS HTTP API (Phase 8, future)
#
# Endpoints exposed:
#   https://ddev.chooz.co.il/zets/          → zets-gui SPA (WhatsApp-style)
#   https://ddev.chooz.co.il/zets/mcp/      → ZETS MCP (port 3145) for Claude
#   https://ddev.chooz.co.il/zets/api/      → ZETS HTTP API (port 3147, future)
#   https://ddev.chooz.co.il/mcp/           → LEGACY cortex MCP (port 3144)
#                                              keep until zets/mcp/ verified,
#                                              then remove
# ═══════════════════════════════════════════════════════

server {
    listen 3140 ssl;
    listen [::]:3140 ssl;
    server_name ddev.chooz.co.il;

    ssl_certificate     /etc/nginx/ssl-certificates/ddev.chooz.co.il.crt;
    ssl_certificate_key /etc/nginx/ssl-certificates/ddev.chooz.co.il.key;

    # ─── ZETS GUI ────────────────────────────────────────
    root /home/dinio/zets-gui/dist;
    index index.html;

    location /zets/ {
        alias /home/dinio/zets-gui/dist/;
        try_files $uri $uri/ /zets/index.html;
    }

    # ─── ZETS MCP (SSE) ──────────────────────────────────
    # Claude connects here: https://ddev.chooz.co.il/zets/mcp/sse
    location /zets/mcp/ {
        proxy_pass http://127.0.0.1:3145/;
        proxy_http_version 1.1;

        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE specifics
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    # ─── ZETS HTTP API (future, Phase 8) ─────────────────
    location /zets/api/ {
        proxy_pass http://127.0.0.1:3147/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ─── LEGACY cortex MCP (delete after verify) ─────────
    location /mcp/ {
        proxy_pass http://127.0.0.1:3144/;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    access_log /var/log/nginx/zets.access.log;
    error_log  /var/log/nginx/zets.error.log;
}
